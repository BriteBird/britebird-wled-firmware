# platformio_override.ini — local build configuration (not committed to git)
# Extends esp32dev with the BLE_Onboarding usermod for Britebird hardware.

; [platformio]
default_envs = esp32dev_ble

[env:britebird_ble]
extends = env:esp32dev
custom_usermods = BLE_Onboarding
                  audioreactive
lib_deps = ${env:esp32dev.lib_deps}
build_flags = ${common.build_flags} ${esp32_idf_V4.build_flags}
              -D WLED_RELEASE_NAME=\"BRITEBIRD_ESP32_Sound_Reactive_BLE\"
              -D SERVERNAME=\"britebird\"
              -D ARDUINO_USB_CDC_ON_BOOT=0
              -D LED_TYPES=30,30
              -D DATA_PINS=18,17
              -D PIXEL_COUNTS=1000,1000
              -D BTNPIN=0
              -D RLYPIN=2
              -D I2S_SDPIN=32
              -D I2S_WSPIN=15
              -D I2S_CKPIN=-1
              -D IRPIN=25
              -D IRTYPE=9
              -D ARDUINOJSON_USE_LONG_LONG=1
              -D WLED_AP_SSID_UNIQUE
              -D WLED_DISABLE_ESPNOW
              -D WLED_DEBUG
              -D CORE_DEBUG_LEVEL=0
              -D CONFIG_NIMBLE_CPP_LOG_LEVEL=4
monitor_speed = 115200
upload_speed = 115200
