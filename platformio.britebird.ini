[platformio]
default_envs = britebird_Sound_Reactive_esp32_debug


[env:britebird_esp32dev]
extends = env:esp32dev
custom_usermods = audioreactive
lib_deps = ${env:esp32dev.lib_deps}
build_flags = ${common.build_flags} ${esp32_idf_V4.build_flags}
              -D WLED_BRAND=\"britebird\"
              -D LED_TYPES=30,30
              -D DATA_PINS=18,17
              -D PIXEL_COUNTS=1000,1000
              -D BTNPIN=0
              -D RLYPIN=2
              -D I2S_SDPIN=32
              -D I2S_WSPIN=15
              -D I2S_CKPIN=-1
              -D IRPIN=25
              -D IRTYPE=9
              -D ARDUINOJSON_USE_LONG_LONG=1
              -D WLED_AP_SSID_UNIQUE
              -D WLED_DISABLE_ESPNOW
              -D WLED_DEBUG
              -D ARDUINO_USB_CDC_ON_BOOT=0
              -D CORE_DEBUG_LEVEL=0
              -D CONFIG_NIMBLE_CPP_LOG_LEVEL=4
monitor_speed = 115200
upload_speed = 115200


[env:britebird_esp32dev_debug]
extends = env:britebird_esp32dev
build_flags = ${env:britebird_esp32dev.build_flags}
              ${common.build_flags}
              -D WLED_DEBUG
              -D ARDUINO_USB_CDC_ON_BOOT=0
              -D CORE_DEBUG_LEVEL=0
              -D CONFIG_NIMBLE_CPP_LOG_LEVEL=4


[env:britebird_Sound_Reactive_esp32]
extends = env:britebird_esp32dev
build_flags = ${env:britebird_esp32dev.build_flags}
              -D WLED_PRODUCT_NAME=\"Sound Reactive Controller\"
              -D WLED_RELEASE_NAME=\"BriteBird_Sound_Reactive\"

[env:britebird_Sound_Reactive_esp32_debug]
extends = env:britebird_Sound_Reactive_esp32
build_unflags = -D WLED_RELEASE_NAME
build_flags = ${env:britebird_esp32dev_debug.build_flags}
              -D WLED_RELEASE_NAME=\"BriteBird_Sound_Reactive_debug\"
